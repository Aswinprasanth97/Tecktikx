<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing Scale" subtitle="4px base · section rhythm 96px" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 32px; background: var(--color-canvas); font-family: var(--font-body); }
  .row { display: flex; align-items: center; gap: 16px; padding: 4px 0; }
  .bar { background: var(--color-primary); height: 16px; border-radius: 3px; }
  .lbl { width: 110px; font: 500 13px var(--font-body); color: var(--color-ink); }
  .val { font: 400 12px var(--font-mono); color: var(--color-muted); }
</style></head>
<body>
  <div class="row"><span class="lbl">xxs</span><span class="bar" style="width:4px"></span><span class="val">4px</span></div>
  <div class="row"><span class="lbl">xs</span><span class="bar" style="width:8px"></span><span class="val">8px</span></div>
  <div class="row"><span class="lbl">sm</span><span class="bar" style="width:12px"></span><span class="val">12px</span></div>
  <div class="row"><span class="lbl">md</span><span class="bar" style="width:16px"></span><span class="val">16px</span></div>
  <div class="row"><span class="lbl">lg</span><span class="bar" style="width:24px"></span><span class="val">24px</span></div>
  <div class="row"><span class="lbl">xl</span><span class="bar" style="width:32px"></span><span class="val">32px · card padding</span></div>
  <div class="row"><span class="lbl">xxl</span><span class="bar" style="width:48px"></span><span class="val">48px · coral callout</span></div>
  <div class="row"><span class="lbl">section</span><span class="bar" style="width:96px"></span><span class="val">96px · band rhythm</span></div>
</body></html>
