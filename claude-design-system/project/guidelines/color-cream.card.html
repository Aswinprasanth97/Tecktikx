<!-- @dsCard group="Colors" viewport="700x170" name="Light Surfaces" subtitle="The cool canvas family — never pure white" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: #ffffff; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid var(--color-hairline); }
  .name { font: 500 13px/1.4 var(--font-body); color: var(--color-ink); margin-top: 8px; }
  .hex { font: 400 12px/1.4 var(--font-mono); color: var(--color-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-canvas)"></div><div class="name">Canvas</div><div class="hex">#f5f9fc</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface-soft)"></div><div class="name">Surface Soft</div><div class="hex">#eaf3fa</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface-card)"></div><div class="name">Surface Card</div><div class="hex">#dcebf7</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface-cream-strong)"></div><div class="name">Strong Tint</div><div class="hex">#c9e1f3</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-hairline)"></div><div class="name">Hairline</div><div class="hex">#d4e4f1</div></div>
  </div>
</body></html>
