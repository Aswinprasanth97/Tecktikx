<!-- @dsCard group="Brand" viewport="700x180" name="Surface Rhythm" subtitle="Pacing alternates light → tint → dark → primary, never repeating" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-canvas); }
  .strip { display: flex; border-radius: var(--radius-lg); overflow: hidden; height: 110px; border: 1px solid var(--color-hairline); }
  .seg { flex: 1; display: flex; align-items: flex-end; padding: 14px; font: 500 13px var(--font-body); }
</style></head>
<body>
  <div class="strip">
    <div class="seg" style="background:#eef5fb;color:#1b262c">Canvas</div>
    <div class="seg" style="background:#bbe1fa;color:#1b262c">Light card</div>
    <div class="seg" style="background:#1b262c;color:#eef5fb">Dark surface</div>
    <div class="seg" style="background:#3282b8;color:#ffffff">Primary callout</div>
  </div>
</body></html>
