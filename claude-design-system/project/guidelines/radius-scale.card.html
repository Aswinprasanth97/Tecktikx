<!-- @dsCard group="Spacing" viewport="700x170" name="Radius Scale" subtitle="Hierarchical — 8px buttons, 12px cards, 16px hero" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-canvas); }
  .row { display: flex; gap: 18px; flex-wrap: wrap; }
  .sw { text-align: center; }
  .box { width: 84px; height: 64px; background: var(--color-surface-card); border: 1px solid var(--color-hairline); }
  .name { font: 500 13px/1.4 var(--font-body); color: var(--color-ink); margin-top: 8px; }
  .val { font: 400 12px var(--font-mono); color: var(--color-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="box" style="border-radius:4px"></div><div class="name">xs</div><div class="val">4px</div></div>
    <div class="sw"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="val">6px</div></div>
    <div class="sw"><div class="box" style="border-radius:8px"></div><div class="name">md</div><div class="val">8px · btn</div></div>
    <div class="sw"><div class="box" style="border-radius:12px"></div><div class="name">lg</div><div class="val">12px · card</div></div>
    <div class="sw"><div class="box" style="border-radius:16px"></div><div class="name">xl</div><div class="val">16px · hero</div></div>
    <div class="sw"><div class="box" style="border-radius:9999px;width:64px"></div><div class="name">pill</div><div class="val">9999px</div></div>
  </div>
</body></html>
