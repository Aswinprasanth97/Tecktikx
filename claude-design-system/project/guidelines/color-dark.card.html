<!-- @dsCard group="Colors" viewport="700x170" name="Dark Surfaces" subtitle="Navy product surfaces — code, footer, featured tiers" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-canvas); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 165px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,0.06); }
  .name { font: 500 13px/1.4 var(--font-body); color: var(--color-ink); margin-top: 8px; }
  .hex { font: 400 12px/1.4 var(--font-mono); color: var(--color-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-surface-dark)"></div><div class="name">Surface Dark</div><div class="hex">#1b262c</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface-dark-soft)"></div><div class="name">Dark Soft</div><div class="hex">#202d36</div></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface-dark-elevated)"></div><div class="name">Dark Elevated</div><div class="hex">#26333d</div></div>
  </div>
</body></html>
