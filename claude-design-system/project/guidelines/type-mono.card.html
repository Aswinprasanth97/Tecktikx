<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-canvas); }
  pre { margin: 0; background: var(--color-surface-dark); color: var(--color-code-plain); border-radius: var(--radius-lg); padding: 20px 24px; font-family: var(--font-mono); font-size: 14px; line-height: 1.6; overflow-x: auto; }
  .k { color: var(--color-code-keyword); }
  .s { color: var(--color-code-string); }
  .c { color: var(--color-code-comment); }
  .f { color: var(--color-code-func); }
</style></head>
<body>
<pre><span class="c"># claude code mockup</span>
<span class="k">from</span> anthropic <span class="k">import</span> Anthropic
client = <span class="f">Anthropic</span>()
msg = client.messages.<span class="f">create</span>(model=<span class="s">"claude-opus"</span>)</pre>
</body></html>
