<!-- @dsCard group="Brand" viewport="700x230" name="Editorial Voice" subtitle="Serif display + sans body — a literary publication, not a SaaS page" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 32px 36px; background: var(--color-canvas); }
  h1 { font-family: var(--font-display); font-weight: var(--type-display-weight); font-size: 44px; line-height: 1.08; letter-spacing: -1px; color: var(--color-ink); margin: 0 0 14px; max-width: 560px; }
  p { font-family: var(--font-body); font-size: 17px; line-height: 1.55; color: var(--color-body); margin: 0; max-width: 520px; }
  .mark { color: var(--color-primary); }
</style></head>
<body>
  <h1>Meet your thinking partner</h1>
  <p>Claude reads like a long-form magazine column, not a marketing template — a calm blue canvas, a considered serif headline, and humanist body type that lets the words breathe. <span class="mark">The serif character is the voice.</span></p>
</body></html>
