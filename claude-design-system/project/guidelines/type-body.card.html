<!-- @dsCard group="Type" viewport="700x340" name="Titles & Body (sans)" subtitle="StyreneB → Inter · humanist, never geometric" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--color-canvas); font-family: var(--font-body); }
  .item { display: flex; align-items: baseline; justify-content: space-between; gap: 24px; padding: 10px 0; border-bottom: 1px solid var(--color-hairline-soft); }
  .item:last-child { border-bottom: 0; }
  .spec { font: 400 12px/1.4 var(--font-mono); color: var(--color-muted-soft); white-space: nowrap; }
</style></head>
<body>
  <div class="item"><span style="font-size:22px;font-weight:500;color:var(--color-ink)">Title large</span><span class="spec">title-lg · 22 / 500</span></div>
  <div class="item"><span style="font-size:18px;font-weight:500;color:var(--color-ink)">Title medium — feature card heading</span><span class="spec">title-md · 18 / 500</span></div>
  <div class="item"><span style="font-size:16px;font-weight:500;color:var(--color-ink)">Title small — connector tile</span><span class="spec">title-sm · 16 / 500</span></div>
  <div class="item"><span style="font-size:16px;font-weight:400;color:var(--color-body)">Body — the default running text size for paragraphs.</span><span class="spec">body-md · 16 / 400</span></div>
  <div class="item"><span style="font-size:14px;font-weight:400;color:var(--color-body)">Body small — footer and fine print.</span><span class="spec">body-sm · 14 / 400</span></div>
  <div class="item"><span style="font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--color-muted)">Caption uppercase</span><span class="spec">caption-up · 12 / 1.5</span></div>
</body></html>
