<div id="root"></div>

<script type="text/babel">
  const { Card, CodeWindow, Tok, Button } = window.ClaudeDesignSystem_8d7c53;
  function Demo() {
    return (
      <div className="grid">
        <Card variant="feature">
          <h4>Feature card</h4>
          <p style={{color:'var(--color-body)'}}>Light blue surface, one step darker than canvas. The default content card.</p>

        <Card variant="outline">

            <span>resp = client.messages.<Tok kind="func">create</Tok>(</span>,
            <span>{"  "}model=<Tok kind="string">"claude-opus"</Tok></span>,

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
