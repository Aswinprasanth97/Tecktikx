<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--color-canvas); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin-bottom: 18px; }
  .row:last-child { margin-bottom: 0; }
  .lbl { width: 100%; font: 500 12px/1.4 var(--font-body); letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-muted-soft); margin-bottom: 2px; }
  .dark { background: var(--color-surface-dark); border-radius: var(--radius-lg); padding: 16px 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton, Input } = window.ClaudeDesignSystem_8d7c53;
  const Arrow = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
  );
  function Demo() {
    return (
      <>
        <div className="row">
          <span className="lbl">Buttons</span>
          <Button variant="primary">Try Claude</Button>
          <Button variant="secondary">Learn more</Button>
          <Button variant="text">Sign in</Button>
          <Button variant="primary" disabled>Disabled</Button>
          <IconButton ariaLabel="Next"><Arrow /></IconButton>
        </div>
        <div className="row dark">
          <Button variant="secondary-on-dark">Docs</Button>
          <Button variant="primary">Run</Button>
          <IconButton variant="on-dark" ariaLabel="Next"><Arrow /></IconButton>
        </div>
        <div className="row">
          <div style={{width: 240}}><Input label="Work email" placeholder="you@company.com" /></div>
          <div style={{width: 180}}><Input label="Seats" error="Required" defaultValue="" /></div>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
